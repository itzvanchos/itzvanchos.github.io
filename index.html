<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanchos</title>
    <link rel="icon" type="image/x-icon" href="static/vanchos.png" id="favicon">
    <style>
        :root {
            --transition: all 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #1f1f1f;
            transition: var(--transition);
            overflow-x: hidden;
        }
        
        body.dark-theme {
            background-color: #3c3c3c;
            color: #ffffff;
        }
        
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dadce0;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: var(--transition);
            height: 63px;
        }
        
        .dark-theme .navbar {
            background-color: #3c3c3c;
            border-bottom: 1px solid #444746;
        }
        
        .navbar-left {
            display: flex;
            align-items: center;
        }
        
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .navbar-logo {
            height: 32px;
            width: 32px;
        }
        
        .theme-toggle, .lang-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            border-radius: 4px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        
        .theme-toggle:hover, .lang-toggle:hover {
            background-color: rgba(0,0,0,0.1);
        }
        
        .dark-theme .theme-toggle:hover, .dark-theme .lang-toggle:hover {
            background-color: rgba(255,255,255,0.1);
        }
        
        .theme-icon {
            width: 16px;
            height: 16px;
        }
        
        .lang-toggle {
            font-size: 14px;
            font-weight: bold;
            color: #1f1f1f;
            width: 32px;
            height: 32px;
        }
        
        .dark-theme .lang-toggle {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <img src="static/vanchos.png" alt="Logo" class="navbar-logo" id="navbar-logo">
        </div>
        <div class="navbar-right">
            <button class="lang-toggle" id="langToggle">РУ</button>
            <button class="theme-toggle" id="themeToggle">
                <img src="static/theme.png" alt="Dark theme" class="theme-icon" id="theme-icon">
            </button>
        </div>
    </nav>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        const navbarLogo = document.getElementById('navbar-logo');
        const langToggle = document.getElementById('langToggle');
        const favicon = document.getElementById('favicon');

        const THEME_KEY = 'vanchos_theme';
        const LANGUAGE_KEY = 'vanchos_language';

        const preloadedImages = {
            light: {
                themeIcon: "static/theme.png",
                logo: "static/vanchos.png",
                favicon: "static/vanchos.png"
            },
            dark: {
                themeIcon: "static/dark-theme.png",
                logo: "static/dark-vanchos.png",
                favicon: "static/dark-vanchos.png"
            }
        };

        function detectSystemTheme() {
            try {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            } catch (e) {
                console.log('Error detecting system theme:', e);
                return 'light';
            }
        }

        function detectSystemLanguage() {
            try {
                const browserLang = navigator.language || navigator.userLanguage || '';
                return browserLang.startsWith('ru') ? 'ru' : 'en';
            } catch (e) {
                console.log('Error detecting system language:', e);
                return 'en';
            }
        }

        function saveToStorage(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (e) {
                console.log('LocalStorage is not available');
            }
        }

        function loadFromStorage(key, defaultValue) {
            try {
                return localStorage.getItem(key) || defaultValue;
            } catch (e) {
                console.log('LocalStorage is not available');
                return defaultValue;
            }
        }

        function applyTheme(isDark) {
            body.classList.toggle('dark-theme', isDark);
            const theme = isDark ? 'dark' : 'light';
            const images = preloadedImages[theme];
            themeIcon.src = images.themeIcon;
            themeIcon.alt = isDark ? "Light theme" : "Dark theme";
            navbarLogo.src = images.logo;
            favicon.href = images.favicon;
        }

        function applyLanguage(isEnglish) {
            langToggle.textContent = isEnglish ? "РУ" : "EN";
        }

        function preloadOppositeThemeImages(isDark) {
            const imagesToPreload = isDark ? preloadedImages.light : preloadedImages.dark;
            
            const head = document.head;
            const values = Object.values(imagesToPreload);
            for (let i = 0; i < values.length; i++) {
                const link = document.createElement('link');
                link.rel = 'preload';
                link.href = values[i];
                link.as = 'image';
                head.appendChild(link);
            }
        }

        function loadSavedSettings() {
            const savedTheme = loadFromStorage(THEME_KEY, null);
            const savedLanguage = loadFromStorage(LANGUAGE_KEY, null);
            
            let isDarkTheme;
            let isEnglish;
            
            if (savedTheme !== null) {
                isDarkTheme = savedTheme === 'dark';
            } else {
                const systemTheme = detectSystemTheme();
                isDarkTheme = systemTheme === 'dark';
            }
            
            if (savedLanguage !== null) {
                isEnglish = savedLanguage === 'en';
            } else {
                const systemLang = detectSystemLanguage();
                isEnglish = systemLang === 'en';
            }
            
            applyTheme(isDarkTheme);
            applyLanguage(isEnglish);
            preloadOppositeThemeImages(isDarkTheme);
            
            return { isDarkTheme, isEnglish };
        }

        let { isDarkTheme, isEnglish } = loadSavedSettings();

        themeToggle.addEventListener('click', function() {
            isDarkTheme = !isDarkTheme;
            applyTheme(isDarkTheme);
            saveToStorage(THEME_KEY, isDarkTheme ? 'dark' : 'light');
        });

        langToggle.addEventListener('click', function() {
            isEnglish = !isEnglish;
            applyLanguage(isEnglish);
            saveToStorage(LANGUAGE_KEY, isEnglish ? 'en' : 'ru');
        });
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            const savedTheme = loadFromStorage(THEME_KEY, null);
            if (savedTheme === null) {
                isDarkTheme = e.matches;
                applyTheme(isDarkTheme);
            }
        });
    </script>
</body>
</html>
