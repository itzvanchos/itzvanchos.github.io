<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanchos</title>
    <link rel="icon" type="image/x-icon" href="static/vanchos.png" id="favicon">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #1f1f1f;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        body.dark-theme {
            background-color: #3c3c3c;
            color: #ffffff;
        }

        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dadce0;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            height: 63px;
        }

        .dark-theme .navbar {
            background-color: #3c3c3c;
            border-bottom: 1px solid #444746;
        }
        
        .navbar-left,
        .navbar-right {
            display: flex;
            align-items: center;
        }

        .navbar-right {
            gap: 8px;
        }

        .navbar-logo {
            height: 32px;
            width: 32px;
            transition: all 0.3s ease;
        }

        .theme-toggle,
        .lang-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .theme-toggle:hover,
        .lang-toggle:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .dark-theme .theme-toggle:hover,
        .dark-theme .lang-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .theme-toggle:active,
        .lang-toggle:active {
            transform: scale(0.9);
        }

        .theme-icon {
            width: 16px;
            height: 16px;
        }

        .lang-toggle {
            font-size: 14px;
            font-weight: bold;
            color: #1f1f1f;
        }

        .dark-theme .lang-toggle {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <img src="static/vanchos.png" alt="Logo" class="navbar-logo" id="navbarLogo">
        </div>
        <div class="navbar-right">
            <button class="lang-toggle" id="langToggle">РУ</button>
            <button class="theme-toggle" id="themeToggle">
                <img src="static/theme.png" alt="Dark theme" class="theme-icon" id="themeIcon">
            </button>
        </div>
    </nav>

    <script>
        const themeAssets = {
            light: {
                themeIcon: "static/theme.png",
                logo: "static/vanchos.png",
                favicon: "static/vanchos.png"
            },
            dark: {
                themeIcon: "static/dark-theme.png",
                logo: "static/dark-vanchos.png",
                favicon: "static/dark-vanchos.png"
            }
        };

        const navbarLogo = document.getElementById('navbarLogo');
        const themeIcon = document.getElementById('themeIcon');
        const favicon = document.getElementById('favicon');
        const themeToggle = document.getElementById('themeToggle');
        const langToggle = document.getElementById('langToggle');

        let isLight;
        let isEnglish;

        function getSavedTheme() {
            try {
                return localStorage.getItem('vanchos_theme');
            } catch {
                return null;
            }
        }

        function getSavedLanguage() {
            try {
                return localStorage.getItem('vanchos_language');
            } catch {
                return null;
            }
        }

        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function getSystemLanguage() {
            return navigator.language.startsWith('ru') ? 'ru' : 'en';
        }

        function applyTheme(light) {
            isLight = light;
            document.body.classList.toggle('dark-theme', !light);
            const assets = light ? themeAssets.light : themeAssets.dark;
            themeIcon.src = assets.themeIcon;
            themeIcon.alt = light ? "Dark theme" : "Light theme";
            navbarLogo.src = assets.logo;
            favicon.href = assets.favicon;
        }

        function applyLanguage(english) {
            isEnglish = english;
            langToggle.textContent = english ? "РУ" : "EN";
        }

        function loadSettings() {
            const savedTheme = getSavedTheme();
            const savedLanguage = getSavedLanguage();

            const theme = savedTheme !== null ? (savedTheme === 'light') : (getSystemTheme() === 'light');
            const language = savedLanguage !== null ? (savedLanguage === 'en') : (getSystemLanguage() === 'en');

            applyTheme(theme);
            applyLanguage(language);
        }

        function saveTheme(light) {
            try {
                localStorage.setItem('vanchos_theme', light ? 'light' : 'dark');
            } catch {}
        }

        function saveLanguage(english) {
            try {
                localStorage.setItem('vanchos_language', english ? 'en' : 'ru');
            } catch {}
        }

        loadSettings();

        themeToggle.addEventListener('click', () => {
            isLight = !isLight;
            applyTheme(isLight);
            saveTheme(isLight);
        });

        langToggle.addEventListener('click', () => {
            isEnglish = !isEnglish;
            applyLanguage(isEnglish);
            saveLanguage(isEnglish);
        });
    </script>
</body>
</html>
